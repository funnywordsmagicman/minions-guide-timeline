name: Update File Badge JSON

on:
  schedule:
    - cron: "3-59/10 * * * *"   # avoids common cron spikes
  workflow_dispatch:

concurrency:
  group: java-file-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: write

    steps:
      - name: Random delay to avoid queue spikes
        run: sleep $((RANDOM % 90))

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get last commit timestamp for file
        run: |
          FILE="Java/Official Java Illegal Guide.md"

          UPDATED=$(git log -1 --format=%cI -- "$FILE")

          if [ -z "$UPDATED" ]; then
            UPDATED=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          fi

          NOW=$(date -u +%s)
          UPDATED_SEC=$(date -d "$UPDATED" +%s)
          DIFF=$((NOW - UPDATED_SEC))

          if [ $DIFF -lt 3600 ]; then
            MSG="$((DIFF/60))m ago"
          elif [ $DIFF -lt 86400 ]; then
            MSG="$((DIFF/3600))h ago"
          elif [ $DIFF -lt 604800 ]; then
            MSG="$((DIFF/86400))d ago"
          elif [ $DIFF -lt 2628000 ]; then
            MSG="$((DIFF/604800))w ago"
          else
            MSG="$((DIFF/2628000))mo ago"
          fi

          echo "Last edit message: $MSG"

          mkdir -p Java/badge
          echo "{
            \"schemaVersion\": 1,
            \"label\": \"Last Guide Update\",
            \"message\": \"$MSG\",
            \"color\": \"brightgreen\"
          }" > Java/badge/file-last-edit.json

      - name: Commit and push badge
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Java/badge/file-last-edit.json
          git commit -m "Update meaningful file edit badge" || echo "No changes to commit"
          git push

      - name: Self-trigger next run (backup chain)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 600
          gh workflow run "${{ github.workflow }}"
