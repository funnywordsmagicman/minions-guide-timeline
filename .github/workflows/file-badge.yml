name: Update File Badge JSON

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get last commit timestamp for file
        run: |
          FILE="Java/Official Java Illegal Guide.md"
          
          # Get last commit timestamp in ISO format
          UPDATED=$(git log -1 --format=%cI -- "$FILE")

          # Fallback to current UTC if somehow empty
          if [ -z "$UPDATED" ]; then
            UPDATED=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          fi

          # Format nicely for badge
          MSG=$(date -u -d "$UPDATED" +"%Y-%m-%d %H:%M UTC")

          # Create badge JSON
          mkdir -p badge
          echo "{
            \"schemaVersion\": 1,
            \"label\": \"Last Guide Update\",
            \"message\": \"$MSG\",
            \"color\": \"green\"
          }" > badge/file-last-edit.json

      - name: Commit and push badge
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add badge/file-last-edit.json
          git commit -m "Update meaningful file edit badge" || echo "No changes to commit"
          git push
