name: Update Meaningful Wiki Edit Badge

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch latest meaningful edit
        run: |
          FEED="https://mcdf.wiki.gg/api.php?action=query&list=recentchanges&rcprop=title|ids|sizes|flags|user|comment|timestamp|tags&format=json"
      
          JSON=$(curl -s "$FEED")
      
          # debug
          echo "$JSON" | jq '.query.recentchanges[:5]'
          echo "UPDATED: $UPDATED"
      
          UPDATED=$(echo "$JSON" | jq -r '
            .query.recentchanges[]
            | select((.minor? | not) and (.bot? | not) and (.new? | not))
            | .timestamp
          ' | head -n1)
      
          echo "UPDATED: $UPDATED"
      
          if [ -z "$UPDATED" ]; then
            UPDATED=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          fi
      
          NOW=$(date -u +%s)
          UPDATED_SEC=$(date -d "$UPDATED" +%s)
          DIFF=$((NOW - UPDATED_SEC))
      
          if [ $DIFF -lt 3600 ]; then
            MSG="$((DIFF/60))m ago"
            COLOR="brightgreen"
          elif [ $DIFF -lt 86400 ]; then
            MSG="$((DIFF/3600))h ago"
            COLOR="green"
          elif [ $DIFF -lt 6048000 ]; then
            MSG="$((DIFF/86400))d ago"
            COLOR="yellow"
          elif [ $DIFF -lt 2628000 ]; then
            MSG="$((DIFF/604800))w ago"
            COLOR="orange"
          else 
            MSG="$((DIFF/2628000))mo ago"
            COLOR="red"
          fi
      
          mkdir -p badge
          echo "{
            \"schemaVersion\": 1,
            \"label\": \"Last Major Edit\",
            \"message\": \"$MSG\",
            \"color\": \"$COLOR\"
          }" > badge/wiki-last-edit.json

      - name: Commit and push badge
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add badge/wiki-last-edit.json
          git commit -m "Update meaningful edit badge" || exit 0
          git push
          
