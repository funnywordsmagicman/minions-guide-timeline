name: Update Wiki Badge JSON

on:
  schedule:
    - cron: "6-59/10 * * * *"   # avoids common queue spikes
  workflow_dispatch:

concurrency:
  group: java-wiki-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: write

    steps:
      - name: Random delay to avoid queue spikes
        run: sleep $((RANDOM % 90))

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest meaningful edit
        run: |
          FEED="https://mcdf.wiki.gg/api.php?action=query&list=recentchanges&rcprop=title|ids|sizes|flags|user|comment|timestamp|tags&format=json"

          JSON=$(curl -s "$FEED")

          # Get most recent non-minor, non-bot, non-new edit
          UPDATED=$(echo "$JSON" | jq -r '
            .query.recentchanges[]
            | select((.minor? | not) and (.bot? | not) and (.new? | not))
            | .timestamp
          ' | head -n1)

          # Fallback to current UTC if no edit found
          if [ -z "$UPDATED" ]; then
            UPDATED=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          fi

          NOW=$(date -u +%s)
          UPDATED_SEC=$(date -d "$UPDATED" +%s)
          DIFF=$((NOW - UPDATED_SEC))

          if [ $DIFF -lt 3600 ]; then
            MSG="$((DIFF/60))m ago"
          elif [ $DIFF -lt 86400 ]; then
            MSG="$((DIFF/3600))h ago"
          elif [ $DIFF -lt 604800 ]; then
            MSG="$((DIFF/86400))d ago"
          elif [ $DIFF -lt 2628000 ]; then
            MSG="$((DIFF/604800))w ago"
          else
            MSG="$((DIFF/2628000))mo ago"
          fi

          echo "Last wiki edit message: $MSG"

          mkdir -p Java/badge
          echo "{
            \"schemaVersion\": 1,
            \"label\": \"Last Wiki Update\",
            \"message\": \"$MSG\",
            \"color\": \"brightgreen\"
          }" > Java/badge/wiki-last-edit.json

      - name: Commit and push badge
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Java/badge/wiki-last-edit.json
          git commit -m "Update wiki last edit json" || echo "No changes to commit"
          git push

      - name: Self-trigger next run (backup chain)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 600
          gh workflow run "${{ github.workflow }}"
